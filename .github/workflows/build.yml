name: Build

on:
  release:
    types: [ published ]

env:
  IMAGE_NAME: jsc-gateway
  IMAGE_TITLE: JSC's Gateway
  IMAGE_DESCRIPTION: A web gateway with JWT authentication and authorization.
    Optionally supports WebSocket proxying.
  SRC_PATH: code/
  DOCKERFILE_PATH: etc/docker/Dockerfile
  NODE_VERSION: "24"

jobs:
  install:
    name: Build source code
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: yarn --cwd ${{ env.SRC_PATH }} install

      - name: Create tarball
        run: tar -czf ${{ env.IMAGE_NAME }}.tar.gz -C ${{ env.SRC_PATH }} node_modules

      - name: Upload common artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IMAGE_NAME }}
          retention-days: 1
          path: ${{ env.IMAGE_NAME }}.tar.gz

  lint:
    name: Run ESlint on source code
    runs-on: ubuntu-24.04
    needs: install

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Untar common Dependencies
        run: tar -xzf ${{ env.IMAGE_NAME }}.tar.gz -C ./${{ env.SRC_PATH }}

      - name: Run ESLint
        run: |
          yarn --cwd ${{ env.SRC_PATH }} lint

  test:
    name: Run tests on source code
    runs-on: ubuntu-24.04
    needs: install

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Untar Dependencies
        run: tar -xzf ${{ env.IMAGE_NAME }}.tar.gz -C ./${{ env.SRC_PATH }}

      - name: Run Tests
        run: |
          mkdir -p ${{ env.SRC_PATH }}coverage
          HAVE_TEST=$(find ${{ env.SRC_PATH }} -name "*.test.ts" | grep -iv node_modules | wc -l)
          if [ $HAVE_TEST -ne 0 ];
          then
            yarn --cwd ${{ env.SRC_PATH }} test:coverage
          fi
          echo "HAVE_TEST=${HAVE_TEST}" > ${{ env.SRC_PATH }}coverage/have_test.txt

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ env.IMAGE_NAME }}
          retention-days: 1
          path: ${{ env.SRC_PATH }}coverage/

  upload-coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report-${{ env.IMAGE_NAME }}
          path: ${{ env.SRC_PATH }}coverage

      - name: Set environment variable
        run: |
          cat ${{ env.SRC_PATH }}coverage/have_test.txt >> $GITHUB_ENV

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: env.HAVE_TEST != 0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./${{ env.SRC_PATH }}coverage/*.json
          flags: unittests
          name: code-coverage
          fail_ci_if_error: true

  build-image:
    name: Build image and push to Docker Hub
    runs-on: ubuntu-24.04
    needs:
      - lint
      - upload-coverage
    if: github.event_name == 'release' && github.event.release.prerelease == false
      && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set environment variable
        run: |
          if [ -f ${{ env.SRC_PATH }}/.env.production ]; then
            cat ${{ env.SRC_PATH }}/.env.production >> $GITHUB_ENV
          else
            cat ${{ env.SRC_PATH }}/.env.example >> $GITHUB_ENV
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_TITLE }}
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
